# Publishes when a version tag is pushed (requires GitHub Actions billing on file for some accounts).
# If Actions do not run, publish from your machine instead:
#   npm login --registry https://registry.npmjs.org/
#   npm run publish:npm
# (Local publish omits --provenance, which is intended for OIDC from CI.)
name: Publish to npm

on:
  release:
    types: [created]
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Full interaction tests (Playwright)
        run: npm run test:e2e
        env:
          CI: true

      - name: Build package
        run: npm run build:lib

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
