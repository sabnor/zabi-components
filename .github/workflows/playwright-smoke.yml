# Fast browser interaction checks for every PR (tag @smoke only).
# Full suite: `npm run test:e2e` locally, in publish workflow, or CI dispatch.
name: Playwright smoke

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: playwright-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run smoke interaction tests
        run: npm run test:e2e:smoke
        env:
          CI: true
